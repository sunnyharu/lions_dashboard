name: 온라인 매출 수집 (PDF)

on:
  schedule:
    - cron: '45 0 * * *'   # 매일 오전 09시 45분 KST (UTC+9 → UTC 00:45)
  workflow_dispatch:        # 수동 실행

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Berriz PDF → ON거래액 수집
        env:
          GOOGLE_EMAIL:       ${{ secrets.GOOGLE_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python crawl_online_sales.py

      - name: 온라인 매출 수집 완료 (대시보드는 뉴스/KBO 수집 후 최종 반영)
