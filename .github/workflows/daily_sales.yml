name: 매장 일별판매집계표 수집

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC+9 → UTC 01:00)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치 (경량)
        run: pip install gspread google-auth python-dotenv

      - name: 이미 실행됐는지 확인
        id: check
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python check_already_run.py

  crawl:
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: python -m playwright install chromium --with-deps

      - name: PlayMD 매출 수집
        env:
          PLAYMD_COMPANY_USER: ${{ secrets.PLAYMD_COMPANY_USER }}
          PLAYMD_COMPANY_PASS: ${{ secrets.PLAYMD_COMPANY_PASS }}
          PLAYMD_USER: ${{ secrets.PLAYMD_USER }}
          PLAYMD_PASS: ${{ secrets.PLAYMD_PASS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python crawl_daily_sales.py

      - name: KBO 경기 결과 수집
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python crawl_kbo_game.py

      - name: 대시보드 생성
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python generate_dashboard.py

      - name: 대시보드 커밋
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/sunnyharu/lions_dashboard.git
          git add dashboard/index.html
          git diff --cached --quiet || git commit -m "chore: 대시보드 업데이트 $(date +'%Y-%m-%d')"
          git push

      - name: 디버그 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore
