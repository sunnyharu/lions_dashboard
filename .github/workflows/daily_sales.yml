name: 매장 일별판매집계표 수집

on:
  workflow_dispatch:        # cron-job.org 또는 수동 실행

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 이미 실행됐는지 확인
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "수동 실행 → 스킵 없이 실행"
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            python check_already_run.py
          fi

  crawl:
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: python -m playwright install chromium --with-deps

      - name: PlayMD 매출 수집 (일별합계)
        env:
          PLAYMD_COMPANY_USER: ${{ secrets.PLAYMD_COMPANY_USER }}
          PLAYMD_COMPANY_PASS: ${{ secrets.PLAYMD_COMPANY_PASS }}
          PLAYMD_USER: ${{ secrets.PLAYMD_USER }}
          PLAYMD_PASS: ${{ secrets.PLAYMD_PASS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python crawl_daily_sales.py

      - name: PlayMD 상품별 매출 수집
        env:
          PLAYMD_COMPANY_USER: ${{ secrets.PLAYMD_COMPANY_USER }}
          PLAYMD_COMPANY_PASS: ${{ secrets.PLAYMD_COMPANY_PASS }}
          PLAYMD_USER: ${{ secrets.PLAYMD_USER }}
          PLAYMD_PASS: ${{ secrets.PLAYMD_PASS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python crawl_product_sales.py

      - name: 실행일 커밋
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/sunnyharu/lions_dashboard.git
          # 오늘 날짜(KST)를 last_run.txt에 기록
          TZ='Asia/Seoul' date +'%Y-%m-%d' > last_run.txt
          echo "last_run.txt: $(cat last_run.txt)"
          git add last_run.txt
          git diff --cached --quiet || git commit -m "chore: 매장매출 수집 완료 $(date +'%Y-%m-%d')"
          git push

      - name: 디버그 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore
