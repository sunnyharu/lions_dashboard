name: 상품별매출 백필 (수동 실행)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: python -m playwright install chromium --with-deps

      - name: 상품별매출 백필 실행
        env:
          PLAYMD_COMPANY_USER: ${{ secrets.PLAYMD_COMPANY_USER }}
          PLAYMD_COMPANY_PASS: ${{ secrets.PLAYMD_COMPANY_PASS }}
          PLAYMD_USER:         ${{ secrets.PLAYMD_USER }}
          PLAYMD_PASS:         ${{ secrets.PLAYMD_PASS }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python backfill_product_sales.py
